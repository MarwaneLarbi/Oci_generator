name: Export OCI to TGZ
on:
  workflow_dispatch:
    inputs:
      image:
        description: "Docker image (e.g. pytorch/pytorch or ollama/ollama)"
        required: true
        default: "ollama/ollama"
      tag:
        description: "Image tag (e.g. latest or 0.30.10)"
        required: true
        default: "latest"
jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (optional)
        uses: actions/checkout@v4

      - name: Install dependencies and ORAS
        run: |
          sudo apt update
          sudo apt install -y snapd lshw
          sudo snap install go --classic
          export PATH=$PATH:/snap/bin
          go install oras.land/oras/cmd/oras@v1.3.1
          sudo mv $(go env GOPATH)/bin/oras /usr/local/bin/

      - name: Prepare variables
        run: |
          IMAGE=${{ github.event.inputs.image }}
          TAG=${{ github.event.inputs.tag }}
          SAFE_NAME=$(echo "$IMAGE" | tr '/:' '-')
          EXPORT_DIR="${SAFE_NAME}-${TAG}"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "EXPORT_DIR=$EXPORT_DIR" >> $GITHUB_ENV

      - name: Pull OCI layout
        run: |
          oras cp --to-oci-layout docker.io/${IMAGE}:${TAG} ${EXPORT_DIR}:${TAG}

      - name: Create tgz
        run: |
          tar -czf ${EXPORT_DIR}.tgz ${EXPORT_DIR}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EXPORT_DIR }}
          path: ${{ env.EXPORT_DIR }}.tgz
