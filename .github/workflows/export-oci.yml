name: Export OCI to TGZ

on:
  workflow_dispatch:
    inputs:
      image:
        description: "Docker image (e.g. pytorch/pytorch or ollama/ollama)"
        required: true
        default: "ollama/ollama"
      tag:
        description: "Image tag (e.g. latest or 3.23.5)"
        required: true
        default: "latest"

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install ORAS
        run: |
          set -e
          sudo snap install go --classic || true
          export PATH=$PATH:/snap/bin
          go install oras.land/oras/cmd/oras@v1.3.1
          sudo mv $(go env GOPATH)/bin/oras /usr/local/bin/
          oras version

      # ✅ Prepare variables (fix library namespace)
      - name: Prepare variables
        run: |
          set -e

          IMAGE="${{ github.event.inputs.image }}"
          TAG="${{ github.event.inputs.tag }}"

          # Add library/ if missing
          if [[ "$IMAGE" != *"/"* ]]; then
            IMAGE="library/$IMAGE"
          fi

          REPO="${IMAGE##*/}"
          EXPORT_DIR="${REPO}-${TAG}"

          echo "IMAGE=$IMAGE" >> $GITHUB_ENV
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "EXPORT_DIR=$EXPORT_DIR" >> $GITHUB_ENV

      # ✅ Pull OCI layout
      - name: Export OCI layout
        run: |
          set -e

          oras cp docker.io/${IMAGE}:${TAG} \
            --to-oci-layout ${EXPORT_DIR}

      - name: Create archive
        run: |
          set -e
          tar -czf ${EXPORT_DIR}.tgz ${EXPORT_DIR}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EXPORT_DIR }}
          path: ${{ env.EXPORT_DIR }}.tgz
