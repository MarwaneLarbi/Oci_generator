name: Export OCI to TGZ (Signed)

on:
  workflow_dispatch:
    inputs:
      image:
        description: "Docker image"
        required: true
        default: "alpine"
      tag:
        description: "Image tag"
        required: true
        default: "3.23.5"

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ✅ Install tools
      - name: Install tools
        run: |
          set -e

          sudo snap install go --classic || true
          export PATH=$PATH:/snap/bin

          go install oras.land/oras/cmd/oras@latest
          go install github.com/notaryproject/notation/cmd/notation@latest

          sudo mv $(go env GOPATH)/bin/oras /usr/local/bin/
          sudo mv $(go env GOPATH)/bin/notation /usr/local/bin/

          oras version
          notation version

      # ✅ Prepare variables
      - name: Prepare variables
        run: |
          set -e

          IMAGE="${{ github.event.inputs.image }}"
          TAG="${{ github.event.inputs.tag }}"

          # Fix Docker Hub "library" images
          if [[ "$IMAGE" != *"/"* ]]; then
            IMAGE="library/$IMAGE"
          fi

          REPO="${IMAGE##*/}"
          EXPORT_DIR="${REPO}-${TAG}"

          echo "IMAGE=$IMAGE" >> $GITHUB_ENV
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "REPO=$REPO" >> $GITHUB_ENV
          echo "EXPORT_DIR=$EXPORT_DIR" >> $GITHUB_ENV

      # ✅ Create signing script
      - name: Create scripts
        run: |
          set -e
          mkdir -p scripts

          cat << 'EOF' > scripts/signoci.sh
          #!/bin/sh -xe
          ref=$1

          notation key delete dev || true
          rm -rf ~/.config/notation/localkeys/dev*
          notation cert delete -t ca -s dev -a -y || true

          notation cert generate-test --default dev
          notation sign $ref
          EOF

          cat << 'EOF' > scripts/process.sh
          #!/bin/sh -xe

          SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"

          ref=$1
          repo=$2
          tag="${ref##*:}"
          out="${repo}-${tag}"

          docker run -d -p 5001:5000 --name reg registry:2
          sleep 3

          # ✅ FULL COPY (CRITICAL FIX)
          # This preserves ALL:
          # - architectures
          # - annotations
          # - attestations
          # - original index
          oras copy $ref \
            --to-plain-http localhost:5001/${repo}:${tag}

          # ✅ Sign WITHOUT modifying index
          $SCRIPT_DIR/signoci.sh localhost:5001/${repo}:${tag}

          # ✅ Export OCI layout (same as oras cp)
          oras cp localhost:5001/${repo}:${tag} \
            --to-oci-layout ${out}

          tar -czf ${out}.tgz ${out}

          docker rm -f reg || true
          EOF

          chmod +x scripts/*.sh

      # ✅ Run pipeline
      - name: Process image
        run: |
          set -e

          ./scripts/process.sh \
            docker.io/${IMAGE}:${TAG} \
            ${REPO} \
            ${EXPORT_DIR}

      # ✅ Collect artifacts
      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          mv *.tgz artifacts/ || true
          cp -r ~/.config/notation artifacts/certs || true

      # ✅ Upload
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: signed-oci-export
          path: artifacts
