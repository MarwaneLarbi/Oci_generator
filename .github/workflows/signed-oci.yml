name: Export OCI to TGZ (Signed)

on:
  workflow_dispatch:
    inputs:
      image:
        description: "Docker image"
        required: true
        default: "alpine"
      tag:
        description: "Image tag"
        required: true
        default: "3.23.5"

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ✅ Install tools
      - name: Install tools
        run: |
          set -e

          sudo apt update
          sudo apt install -y jq openssl

          sudo snap install go --classic || true
          export PATH=$PATH:/snap/bin

          go install oras.land/oras/cmd/oras@latest
          go install github.com/notaryproject/notation/cmd/notation@latest

          sudo mv $(go env GOPATH)/bin/oras /usr/local/bin/
          sudo mv $(go env GOPATH)/bin/notation /usr/local/bin/

      # ✅ Prepare variables
      - name: Prepare variables
        run: |
          IMAGE="${{ github.event.inputs.image }}"
          TAG="${{ github.event.inputs.tag }}"

          if [[ "$IMAGE" != *"/"* ]]; then
            IMAGE="library/$IMAGE"
          fi

          REPO="${IMAGE##*/}"

          echo "IMAGE=$IMAGE" >> $GITHUB_ENV
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "REPO=$REPO" >> $GITHUB_ENV

      # ✅ Main process
      - name: Process image
        run: |
          set -e

          REF="docker.io/${IMAGE}:${TAG}"
          LOCAL="localhost:5001/${REPO}:${TAG}"
          OUT="${REPO}-${TAG}"

          # Start registry
          docker run -d -p 5001:5000 --name reg registry:2
          sleep 3

          # Copy full image (multi-arch OK)
          oras copy $REF --to-plain-http $LOCAL

          # ✅ Generate cert + sign
          notation cert generate-test --default dev

          SIGN_OUTPUT=$(notation sign $LOCAL)
          echo "$SIGN_OUTPUT"

          # ✅ Extract digest (CRITICAL FIX)
          DIGEST=$(echo "$SIGN_OUTPUT" | grep -o 'sha256:[a-f0-9]\{64\}')

          if [ -z "$DIGEST" ]; then
            echo "❌ Failed to extract digest"
            exit 1
          fi

          echo "✅ Digest: $DIGEST"

          DIGEST_REF="localhost:5001/${REPO}@${DIGEST}"

          # ✅ Inspect using digest (NOT tag!)
          notation inspect $DIGEST_REF -o json > inspect.json

          echo "=== inspect.json ==="
          cat inspect.json

          # ✅ Extract signer cert (robust + simple)
          jq -r '.signatures[0].certificateChain[0]' inspect.json > signer.crt

          # ✅ Validate cert
          if ! openssl x509 -in signer.crt -noout -subject; then
            echo "❌ Invalid certificate extracted"
            exit 1
          fi

          echo "✅ Certificate OK"

          # ✅ Export OCI WITH signatures
          oras copy -r $LOCAL --to-oci-layout $OUT

          tar -czf ${OUT}.tgz $OUT

          docker rm -f reg

      # ✅ Save output
      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          mv *.tgz artifacts/
          mv signer.crt artifacts/
          mv inspect.json artifacts/

      - uses: actions/upload-artifact@v4
        with:
          name: signed-oci-export
          path: artifacts
