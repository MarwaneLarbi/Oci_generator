name: Export OCI to TGZ (Signed)

on:
  workflow_dispatch:
    inputs:
      image:
        required: true
        default: "ollama/ollama"
      tag:
        required: true
        default: "latest"

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ✅ Tools
      - name: Install tools
        run: |
          set -e

          docker --version

          sudo snap install go --classic || true
          export PATH=$PATH:/snap/bin

          go install oras.land/oras/cmd/oras@latest
          go install github.com/notaryproject/notation/cmd/notation@latest

          sudo mv $(go env GOPATH)/bin/oras /usr/local/bin/
          sudo mv $(go env GOPATH)/bin/notation /usr/local/bin/

          oras version
          notation version

      # ✅ Variables (fix namespace)
      - name: Prepare variables
        run: |
          set -e

          IMAGE="${{ github.event.inputs.image }}"
          TAG="${{ github.event.inputs.tag }}"

          if [[ "$IMAGE" != *"/"* ]]; then
            IMAGE="library/$IMAGE"
          fi

          REPO="${IMAGE##*/}"
          EXPORT_DIR="${REPO}-${TAG}"

          echo "IMAGE=$IMAGE" >> $GITHUB_ENV
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "REPO=$REPO" >> $GITHUB_ENV
          echo "EXPORT_DIR=$EXPORT_DIR" >> $GITHUB_ENV

      # ✅ Scripts
      - name: Create scripts
        run: |
          set -e
          mkdir -p scripts

          # signoci.sh
          cat << 'EOF' > scripts/signoci.sh
          #!/bin/sh -xe
          ref=$1

          notation key delete dev || true
          rm -rf ~/.config/notation/localkeys/dev*
          notation cert delete -t ca -s dev -a -y || true

          notation cert generate-test --default dev
          notation sign $ref
          EOF

          # export.sh
          cat << 'EOF' > scripts/export.sh
          #!/bin/sh -xe
          ref=$1
          out=$2

          oras cp $ref --to-oci-layout $out
          tar -czf ${out}.tgz $out
          EOF

          # process.sh
          cat << 'EOF' > scripts/process.sh
          #!/bin/sh -xe

          SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"

          ref=$1
          repo=$2
          out=$3

          docker run -d -p 5001:5000 --name reg registry:2
          sleep 3

          # Pull both architectures
          oras copy -r --platform linux/amd64 $ref --to-plain-http localhost:5001/${repo}-amd64
          oras copy -r --platform linux/arm64 $ref --to-plain-http localhost:5001/${repo}-arm64

          # Create index
          oras manifest index create \
            localhost:5001/$repo \
            localhost:5001/${repo}-amd64 \
            localhost:5001/${repo}-arm64

          # Sign
          $SCRIPT_DIR/signoci.sh localhost:5001/$repo

          # Export
          $SCRIPT_DIR/export.sh localhost:5001/$repo $out

          docker rm -f reg || true
          EOF

          chmod +x scripts/*.sh

      # ✅ Run pipeline
      - name: Process
        run: |
          set -e
          ./scripts/process.sh \
            docker.io/${IMAGE}:${TAG} \
            ${REPO} \
            ${EXPORT_DIR}

      # ✅ Collect
      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          mv *.tgz artifacts/ || true
          cp -r ~/.config/notation artifacts/certs || true

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: signed-oci-export
          path: artifacts
