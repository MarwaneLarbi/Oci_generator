name: Export OCI to TGZ (Signed)

on:
  workflow_dispatch:
    inputs:
      image:
        description: "Docker image"
        required: true
        default: "alpine"
      tag:
        description: "Image tag"
        required: true
        default: "3.23.5"

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ✅ Install tools
      - name: Install tools
        run: |
          set -e

          sudo apt update
          sudo apt install -y jq openssl

          sudo snap install go --classic || true
          export PATH=$PATH:/snap/bin

          go install oras.land/oras/cmd/oras@latest
          go install github.com/notaryproject/notation/cmd/notation@latest

          sudo mv $(go env GOPATH)/bin/oras /usr/local/bin/
          sudo mv $(go env GOPATH)/bin/notation /usr/local/bin/

          oras version
          notation version

      # ✅ Prepare variables
      - name: Prepare variables
        run: |
          set -e

          IMAGE="${{ github.event.inputs.image }}"
          TAG="${{ github.event.inputs.tag }}"

          if [[ "$IMAGE" != *"/"* ]]; then
            IMAGE="library/$IMAGE"
          fi

          REPO="${IMAGE##*/}"
          EXPORT_DIR="${REPO}-${TAG}"

          echo "IMAGE=$IMAGE" >> $GITHUB_ENV
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "REPO=$REPO" >> $GITHUB_ENV
          echo "EXPORT_DIR=$EXPORT_DIR" >> $GITHUB_ENV

      # ✅ Create scripts
      - name: Create scripts
        run: |
          set -e
          mkdir -p scripts

          # ✅ SIGN SCRIPT (FINAL FIX)
          cat << 'EOF' > scripts/signoci.sh
          #!/bin/sh -xe

          ref=$1

          notation cert generate-test --default dev
          notation sign $ref

          # Export inspect
          notation inspect $ref -o json > inspect.json

          echo "=== DEBUG: inspect.json ==="
          cat inspect.json

          # ✅ Robust certificate extraction (handles all formats)
          CERT=$(jq -r '
            if .signatures and (.signatures | length > 0) then
              if .signatures[0].certificateChain then
                .signatures[0].certificateChain[0]
              elif .signatures[0].certificates then
                .signatures[0].certificates[0]
              elif .signatures[0].x509Certificate then
                .signatures[0].x509Certificate
              else
                empty
              end
            else
              empty
            end
          ' inspect.json)

          # ✅ Fail fast if missing
          if [ -z "$CERT" ] || [ "$CERT" = "null" ]; then
            echo "❌ ERROR: No certificate found in inspect.json"
            exit 1
          fi

          # Save certificate
          echo "$CERT" > signer.crt

          echo "✅ Extracted signer certificate:"
          openssl x509 -in signer.crt -noout -subject -issuer
          EOF

          # ✅ PROCESS SCRIPT
          cat << 'EOF' > scripts/process.sh
          #!/bin/sh -xe

          SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"

          ref=$1
          repo=$2

          tag="${ref##*:}"
          out="${repo}-${tag}"

          # Start local registry
          docker run -d -p 5001:5000 --name reg registry:2
          sleep 3

          # Copy FULL image
          oras copy $ref \
            --to-plain-http localhost:5001/${repo}:${tag}

          # Sign + extract certificate
          $SCRIPT_DIR/signoci.sh localhost:5001/${repo}:${tag}

          # Export OCI WITH signatures
          oras copy -r \
            localhost:5001/${repo}:${tag} \
            --to-oci-layout ${out}

          tar -czf ${out}.tgz ${out}

          docker rm -f reg || true
          EOF

          chmod +x scripts/*.sh

      # ✅ Run pipeline
      - name: Process image
        run: |
          set -e

          ./scripts/process.sh \
            docker.io/${IMAGE}:${TAG} \
            ${REPO}

      # ✅ Collect artifacts
      - name: Collect artifacts
        run: |
          mkdir -p artifacts

          mv *.tgz artifacts/ || true
          mv signer.crt artifacts/ || true
          mv inspect.json artifacts/ || true

      # ✅ Upload result
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: signed-oci-export
          path: artifacts
