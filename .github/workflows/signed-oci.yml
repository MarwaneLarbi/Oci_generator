name: Export OCI to TGZ (Signed)

on:
  workflow_dispatch:
    inputs:
      image:
        description: "Docker image"
        required: true
        default: "alpine"
      tag:
        description: "Image tag"
        required: true
        default: "3.23.5"

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ✅ Install tools
      - name: Install tools
        run: |
          set -e

          sudo apt update
          sudo apt install -y jq openssl

          sudo snap install go --classic || true
          export PATH=$PATH:/snap/bin

          go install oras.land/oras/cmd/oras@latest
          go install github.com/notaryproject/notation/cmd/notation@latest

          sudo mv $(go env GOPATH)/bin/oras /usr/local/bin/
          sudo mv $(go env GOPATH)/bin/notation /usr/local/bin/

          oras version
          notation version

      # ✅ Prepare variables
      - name: Prepare variables
        run: |
          set -e

          IMAGE="${{ github.event.inputs.image }}"
          TAG="${{ github.event.inputs.tag }}"

          if [[ "$IMAGE" != *"/"* ]]; then
            IMAGE="library/$IMAGE"
          fi

          REPO="${IMAGE##*/}"
          EXPORT_DIR="${REPO}-${TAG}"

          echo "IMAGE=$IMAGE" >> $GITHUB_ENV
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "REPO=$REPO" >> $GITHUB_ENV
          echo "EXPORT_DIR=$EXPORT_DIR" >> $GITHUB_ENV

      # ✅ Create scripts
      - name: Create scripts
        run: |
          set -e
          mkdir -p scripts

          # ✅ SIGN SCRIPT
          # IMPORTANT: no deletion, no CA export, just sign + inspect
          cat << 'EOF' > scripts/signoci.sh
          #!/bin/sh -xe

          ref=$1

          # ✅ Generate ephemeral key (fine for 1-run use)
          notation cert generate-test --default dev

          # ✅ Sign image
          notation sign $ref

          # ✅ Extract EXACT signer cert used in signature (LEAF cert)
          notation inspect $ref -o json > inspect.json

          cat inspect.json \
            | jq -r '.signatures[0].certificateChain[0]' \
            | base64 -d > signer.crt

          echo "✅ Extracted signer certificate:"
          openssl x509 -in signer.crt -noout -subject -issuer
          EOF

          # ✅ PROCESS SCRIPT
          cat << 'EOF' > scripts/process.sh
          #!/bin/sh -xe

          SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"

          ref=$1
          repo=$2

          tag="${ref##*:}"
          out="${repo}-${tag}"

          # ✅ Start local registry
          docker run -d -p 5001:5000 --name reg registry:2
          sleep 3

          # ✅ Copy FULL image (keep multi-arch + metadata)
          oras copy $ref \
            --to-plain-http localhost:5001/${repo}:${tag}

          # ✅ Sign + extract correct certificate
          $SCRIPT_DIR/signoci.sh localhost:5001/${repo}:${tag}

          # ✅ Export OCI layout INCLUDING signatures
          oras copy -r \
            localhost:5001/${repo}:${tag} \
            --to-oci-layout ${out}

          tar -czf ${out}.tgz ${out}

          docker rm -f reg || true
          EOF

          chmod +x scripts/*.sh

      # ✅ Run pipeline
      - name: Process image
        run: |
          set -e

          ./scripts/process.sh \
            docker.io/${IMAGE}:${TAG} \
            ${REPO}

      # ✅ Collect artifacts
      - name: Collect artifacts
        run: |
          mkdir -p artifacts

          mv *.tgz artifacts/ || true
          mv signer.crt artifacts/ || true
          mv inspect.json artifacts/ || true

      # ✅ Upload outputs
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: signed-oci-export
          path: artifacts
